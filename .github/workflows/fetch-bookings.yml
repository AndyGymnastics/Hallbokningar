name: Fetch Bookings Cache

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/fetch-bookings.js']

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch bookings data
        run: node scripts/fetch-bookings.js

      - name: Commit and push cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bookings.json
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m 'chore: update bookings cache [skip ci]'
          git pull --rebase origin main
          git push
